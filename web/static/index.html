<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DNS Server · Live Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #21262d; --text: #e6edf3;
    --muted: #8b949e; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
    --amber: #d29922; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  header .status { color: var(--muted); font-size: 13px; margin-left: auto; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .tile {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px;
  }
  .tile .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .tile .value { font-size: 30px; font-weight: 650; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .tile .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .value.blocked { color: var(--red); } .value.cache { color: var(--blue); }
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-top: 16px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card h2 { font-size: 13px; margin: 0; padding: 14px 18px; border-bottom: 1px solid var(--border);
    color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 8px 18px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.name { max-width: 340px; overflow: hidden; text-overflow: ellipsis; }
  tbody tr:last-child td { border-bottom: none; }
  .log-wrap { max-height: 460px; overflow-y: auto; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.blocked { background: rgba(248,81,73,.15); color: var(--red); }
  .badge.cache   { background: rgba(88,166,255,.15); color: var(--blue); }
  .badge.resolved{ background: rgba(63,185,80,.15); color: var(--green); }
  .badge.error   { background: rgba(210,153,34,.15); color: var(--amber); }
  tr.flash { animation: flash 1s ease-out; }
  @keyframes flash { from { background: rgba(88,166,255,.12); } to { background: transparent; } }
  .bar { height: 6px; background: var(--accent); border-radius: 3px; margin-top: 4px; opacity: .8; }
  .row-domain { padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .row-domain:last-child { border-bottom: none; }
  .row-domain .top { display: flex; justify-content: space-between; font-size: 13px; }
  .row-domain .cnt { color: var(--muted); }
  .muted { color: var(--muted); }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>DNS Server &middot; Ad-Blocker</h1>
    <span class="status" id="status">connecting…</span>
  </header>
  <main>
    <div class="tiles">
      <div class="tile"><div class="label">Queries</div><div class="value" id="total">0</div><div class="sub">since start</div></div>
      <div class="tile"><div class="label">Blocked</div><div class="value blocked" id="blocked-pct">0%</div><div class="sub" id="blocked-cnt">0 queries</div></div>
      <div class="tile"><div class="label">Cache hit rate</div><div class="value cache" id="cache-pct">0%</div><div class="sub" id="cache-cnt">0 entries cached</div></div>
      <div class="tile"><div class="label">Avg latency</div><div class="value" id="latency">–</div><div class="sub">last 50 queries</div></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Live query log</h2>
        <div class="log-wrap">
          <table>
            <thead><tr><th>Time</th><th>Domain</th><th>Type</th><th>Result</th><th>Latency</th><th>Client</th></tr></thead>
            <tbody id="log"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h2>Top blocked</h2>
        <div id="top-blocked"><div class="row-domain muted">none yet</div></div>
        <h2 style="border-top:1px solid var(--border)">Top resolved</h2>
        <div id="top-domains"><div class="row-domain muted">none yet</div></div>
      </div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let latencies = [];

function resultBadge(e) {
  if (e.blocked) return '<span class="badge blocked">blocked</span>';
  if (e.cache_hit) return '<span class="badge cache">cache</span>';
  if (e.rcode === 'NOERROR') return '<span class="badge resolved">resolved</span>';
  return '<span class="badge error">' + e.rcode + '</span>';
}
function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour12: false});
}
function addRow(e, flash) {
  const tr = document.createElement('tr');
  if (flash) tr.className = 'flash';
  tr.innerHTML =
    `<td class="muted">${fmtTime(e.ts)}</td>` +
    `<td class="name" title="${e.name}">${e.name}</td>` +
    `<td class="muted">${e.qtype}</td>` +
    `<td>${resultBadge(e)}</td>` +
    `<td class="muted">${e.latency_ms.toFixed(1)} ms</td>` +
    `<td class="muted">${e.client}</td>`;
  const log = $('log');
  log.insertBefore(tr, log.firstChild);
  while (log.children.length > 200) log.removeChild(log.lastChild);
}
function renderDomains(elId, pairs, cls) {
  const el = $(elId);
  if (!pairs || !pairs.length) { el.innerHTML = '<div class="row-domain muted">none yet</div>'; return; }
  const max = pairs[0][1] || 1;
  el.innerHTML = pairs.map(([name, n]) =>
    `<div class="row-domain"><div class="top"><span class="name">${name}</span><span class="cnt">${n}</span></div>` +
    `<div class="bar" style="width:${Math.max(6, n/max*100)}%;background:${cls}"></div></div>`
  ).join('');
}
function refreshTiles(s) {
  $('total').textContent = s.total.toLocaleString();
  $('blocked-pct').textContent = s.blocked_pct + '%';
  $('blocked-cnt').textContent = s.blocked.toLocaleString() + ' queries';
  $('cache-pct').textContent = s.cache_hit_pct + '%';
  $('cache-cnt').textContent = (s.cache?.entries ?? 0) + ' entries cached';
}
function refreshLatency() {
  if (!latencies.length) return;
  const avg = latencies.reduce((a, b) => a + b, 0) / latencies.length;
  $('latency').textContent = avg.toFixed(1) + ' ms';
}

// Local running counts so tiles update instantly on each event.
let counts = { total: 0, blocked: 0, cache_hits: 0 };

async function init() {
  const s = await (await fetch('/api/stats')).json();
  counts = { total: s.total, blocked: s.blocked, cache_hits: s.cache_hits };
  refreshTiles(s);
  renderDomains('top-blocked', s.top_blocked, 'var(--red)');
  renderDomains('top-domains', s.top_domains, 'var(--green)');
  (s.recent || []).slice().reverse().forEach((e) => { latencies.push(e.latency_ms); addRow(e, false); });
  refreshLatency();
}

function connect() {
  const es = new EventSource('/events');
  es.onopen = () => { $('status').textContent = '● live'; };
  es.onerror = () => { $('status').textContent = 'reconnecting…'; };
  es.onmessage = (msg) => {
    const e = JSON.parse(msg.data);
    counts.total++;
    if (e.blocked) counts.blocked++;
    if (e.cache_hit) counts.cache_hits++;
    $('total').textContent = counts.total.toLocaleString();
    $('blocked-pct').textContent = (counts.total ? (counts.blocked / counts.total * 100) : 0).toFixed(1) + '%';
    $('blocked-cnt').textContent = counts.blocked.toLocaleString() + ' queries';
    $('cache-pct').textContent = (counts.total ? (counts.cache_hits / counts.total * 100) : 0).toFixed(1) + '%';
    latencies.push(e.latency_ms); if (latencies.length > 50) latencies.shift();
    refreshLatency();
    addRow(e, true);
  };
  // Periodically refresh the aggregate panels (top lists, cache entry count).
  setInterval(async () => {
    try {
      const s = await (await fetch('/api/stats')).json();
      renderDomains('top-blocked', s.top_blocked, 'var(--red)');
      renderDomains('top-domains', s.top_domains, 'var(--green)');
      $('cache-cnt').textContent = (s.cache?.entries ?? 0) + ' entries cached';
    } catch (_) {}
  }, 5000);
}

init().then(connect);
</script>
</body>
</html>
